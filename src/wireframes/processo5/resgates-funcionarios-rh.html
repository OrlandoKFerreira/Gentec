<!DOCTYPE html>
<html>
<head>
    <title>Resgates dos Funcionários</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="header">
    <div>Sistema RH</div>
    <div>Marcelo (RH)</div>
</div>

<div class="container">

<div class="sidebar">
    <a>Dashboard</a>
    <a>Benefícios</a>
    <a>Pontuação</a>
    <a>Resgates</a>
</div>

<div class="content">

    <div class="card">
        <h2>Resgates dos Funcionários</h2>

        <label>Status</label>
        <select>
            <option>Todos</option>
            <option>Pendente</option>
            <option>Aprovado</option>
            <option>Recusado</option>
            <option>Resgatado</option>
        </select>

        <label>Funcionário</label>
        <input type="text">

        <button>Filtrar</button>
    </div>

    <div class="card">
        <table>
            <tr>
                <th>Funcionário</th>
                <th>Benefício</th>
                <th>Pontos usados</th>
                <th>Status</th>
                <th>Data</th>
                <th>Ação</th>
            </tr>

            <tr>
                <td>João</td>
                <td>1 dia de folga</td>
                <td>50</td>
                <td><span class="badge badge-pendente">Pendente</span></td>
                <td>25/04/2026</td>
                <td><button>Ver</button></td>
            </tr>

            <tr>
                <td>Ana</td>
                <td>Vale lanche</td>
                <td>30</td>
                <td><span class="badge badge-resgatado">Resgatado</span></td>
                <td>20/04/2026</td>
                <td><button>Ver</button></td>
            </tr>
        </table>
    </div>

    <div class="card" style="text-align: center;">
        <button>1</button>
        <button>2</button>
        <button>Próxima</button>
    </div>

</div>

</div>

</body>
</html>
