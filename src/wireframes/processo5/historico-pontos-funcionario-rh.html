<!DOCTYPE html>
<html>
<head>
    <title>Histórico do Funcionário</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="header">
    <div>Sistema RH</div>
    <div>Marcelo (RH)</div>
</div>

<div class="container">

<div class="sidebar">
    <a>Dashboard</a>
    <a>Benefícios</a>
    <a>Pontuação</a>
    <a>Resgates</a>
</div>

<div class="content">

    <div class="card">
        <h2>Histórico de Pontos - João Silva</h2>

        <p><strong>Cargo:</strong> Analista Administrativo</p>
        <p><strong>Total atual de pontos:</strong> 120 pontos</p>
    </div>

    <div class="card">
        <h2>Resgates do Funcionário</h2>

        <table>
            <tr>
                <th>Benefício</th>
                <th>Pontos usados</th>
                <th>Status</th>
                <th>Data</th>
            </tr>

            <tr>
                <td>1 dia de folga</td>
                <td>50</td>
                <td><span class="badge badge-aprovado">Resgatado</span></td>
                <td>18/04/2026</td>
            </tr>
        </table>
    </div>

    <div class="card">
        <button>Voltar</button>
    </div>

</div>

</div>

</body>
</html>
