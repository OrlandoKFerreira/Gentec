<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Benefícios RH</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="header">
    <div>Sistema RH</div>
    <div>Marcelo (RH)</div>
</div>

<div class="container">

<div class="sidebar">
    <a>Dashboard</a>
    <a>Benefícios</a>
    <a>Pontuação</a>
    <a>Resgates</a>
</div>

<div class="content">

    <div class="card">
        <h2>Gestão de Benefícios</h2>
        <p>Resumo da distribuição de pontos e dos resgates realizados.</p>
    </div>

    <div class="card">
        <p><strong>Benefícios cadastrados:</strong> 8</p>
        <p><strong>Pontos distribuídos:</strong> 1240</p>
        <p><strong>Resgates realizados:</strong> 32</p>
        <p><strong>Resgates pendentes:</strong> 5</p>
    </div>

    <div class="card">
        <button>Gerenciar Benefícios</button>
        <button>Gerenciar Pontuação de Funcionários</button>
        <button>Gerenciar Resgates</button>
        <button>Ver Histórico</button>
    </div>

</div>

</div>

</body>
</html>
