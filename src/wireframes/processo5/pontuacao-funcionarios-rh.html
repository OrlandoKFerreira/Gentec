<!DOCTYPE html>
<html>
<head>
    <title>Pontuação de Funcionários</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="header">
    <div>Sistema RH</div>
    <div>Marcelo (RH)</div>
</div>

<div class="container">

<div class="sidebar">
    <a>Dashboard</a>
    <a>Benefícios</a>
    <a>Pontuação</a>
    <a>Resgates</a>
</div>

<div class="content">

    <div class="card">
        <h2>Pontuação de Funcionários</h2>
        <p>Adicione ou remova pontos manualmente de um funcionário.</p>

        <label>Funcionário</label>
        <input type="text" placeholder="Nome do funcionário">

        <label>Tipo de movimentação</label>
        <select>
            <option>Adicionar pontos</option>
            <option>Remover pontos</option>
        </select>

        <label>Quantidade de pontos</label>
        <input type="number">

        <label>Motivo</label>
        <select>
            <option>Bom desempenho</option>
            <option>Cumprimento de meta</option>
            <option>Chegada no horário</option>
            <option>Reconhecimento interno</option>
            <option>Ajuste manual</option>
            <option>Correção de lançamento</option>
            <option>Outro</option>
        </select>

        <label>Observação</label>
        <textarea></textarea>

        <button>Salvar Movimentação</button>
    </div>

</div>

</div>

</body>
</html>
