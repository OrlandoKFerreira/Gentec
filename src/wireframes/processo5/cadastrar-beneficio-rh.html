<!DOCTYPE html>
<html>
<head>
    <title>Cadastrar Benefício</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="header">
    <div>Sistema RH</div>
    <div>Marcelo (RH)</div>
</div>

<div class="container">

<div class="sidebar">
    <a>Dashboard</a>
    <a>Benefícios</a>
    <a>Pontuação</a>
    <a>Resgates</a>
</div>

<div class="content">

    <div class="card">
        <h2>Cadastrar Benefício</h2>

        <label>Nome do benefício</label>
        <input type="text">

        <label>Custo em pontos</label>
        <input type="number">

        <label>Descrição</label>
        <textarea></textarea>

        <label>Status</label>
        <select>
            <option>Ativo</option>
            <option>Inativo</option>
        </select>

        <label>Precisa aprovação?</label>
        <select>
            <option>Sim</option>
            <option>Não</option>
        </select>

        <button>Cadastrar</button>
        <button>Cancelar</button>
    </div>

</div>

</div>

</body>
</html>
