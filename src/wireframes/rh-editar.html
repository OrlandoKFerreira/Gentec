<!DOCTYPE html>
<html>
<head>
    <title>Editar Funcionário</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="header">
    <div>Sistema RH</div>
    <div>Marcelo (RH)</div>
</div>

<div class="container">

<div class="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="employees.html">Funcionários</a>
</div>

<div class="content">
    <div class="card">
        <h2>Editar Funcionário</h2>

        <label>Nome</label>
        <input type="text" value="João Silva">

        <label>CPF</label>
        <input type="text" value="123.456.789-00">

        <label>Cargo</label>
        <input type="text" value="Desenvolvedor">

        <label>Setor</label>
        <select>
            <option selected>TI</option>
            <option>Comercial</option>
            <option>RH</option>
        </select>

        <div class="checkbox-field">
            <input type="checkbox" id="gestor">
            <label for="gestor">Gestor</label>
        </div>

        <label>Entrada</label>
        <select>
            <option selected>08:00</option>
            <option>09:00</option>
            <option>10:00</option>
        </select>

        <label>Saída</label>
        <select>
            <option selected>17:00</option>
            <option>18:00</option>
            <option>19:00</option>
        </select>

        <button>Salvar Alterações</button>
    </div>
</div>

</div>

</body>
</html>
