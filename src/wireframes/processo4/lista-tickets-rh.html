<!DOCTYPE html>
<html>
<head>
    <title>Tickets</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="header">
    <div>Sistema RH</div>
    <div>Marcelo (RH)</div>
</div>

<div class="container">

<div class="sidebar">
    <a>Dashboard</a>
    <a>Tickets</a>
</div>

<div class="content">

    <div class="card">
        <h2>Tickets</h2>

        <label>Status</label>
        <select>
            <option>Todos</option>
            <option>Aberto</option>
            <option>Em andamento</option>
            <option>Finalizado</option>
        </select>

        <label>Funcionário</label>
        <input type="text">

        <button>Filtrar</button>
    </div>

    <div class="card">
        <table>
            <tr>
                <th>Funcionário</th>
                <th>Título</th>
                <th>Status</th>
                <th>Ação</th>
            </tr>

            <tr>
                <td>João</td>
                <td>Pagamento</td>
                <td>Aberto</td>
                <td><button>Ver</button></td>
            </tr>

        </table>
    </div>

    <div class="card" style="text-align: center;">
        <button>1</button>
        <button>2</button>
        <button>Próxima</button>
    </div>

</div>

</div>

</body>
</html>
