<!DOCTYPE html>
<html>
<head>
    <title>Meus Tickets</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="header">
    <div>Sistema RH</div>
    <div>João (Funcionário)</div>
</div>

<div class="container">

<div class="sidebar">
    <a>Dashboard</a>
    <a>Meus Tickets</a>
    <a>Abrir Ticket</a>
</div>

<div class="content">

    <div class="card">
        <h2>Meus Tickets</h2>

        <p><strong>Total:</strong> 12</p>

        <label>Status</label>
        <select>
            <option>Todos</option>
            <option>Aberto</option>
            <option>Em andamento</option>
            <option>Finalizado</option>
        </select>

        <button>Filtrar</button>
    </div>

    <div class="card">
        <table>
            <tr>
                <th>Título</th>
                <th>Status</th>
                <th>Data</th>
                <th>Detalhe</th>
            </tr>

            <tr>
                <td>Problema no pagamento</td>
                <td>Aberto</td>
                <td>10/04/2026</td>
                <td><button>Ver</button></td>
            </tr>

            <tr>
                <td>Dúvida sobre férias</td>
                <td>Finalizado</td>
                <td>05/04/2026</td>
                <td><button>Ver</button></td>
            </tr>

        </table>
    </div>

    <div class="card" style="text-align: center;">
        <button>1</button>
        <button>2</button>
        <button>Próxima</button>
    </div>

</div>

</div>

</body>
</html>
